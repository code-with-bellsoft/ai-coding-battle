services:
  postgres:
    image: postgres:18-alpine
    container_name: telemed-postgres
    environment:
      POSTGRES_DB: telemed
      POSTGRES_USER: meduser
      POSTGRES_PASSWORD: medpass
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U neon -d telemed"]
      interval: 5s
      timeout: 3s
      retries: 10
    volumes:
      - telemed_pgdata:/var/lib/postgresql/data

volumes:
  telemed_pgdata: