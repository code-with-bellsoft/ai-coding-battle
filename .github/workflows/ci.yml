name: CI

on:
  push:
    branches: [main]
    paths:
      - "**"
      - ".github/workflows/ci.yml"
  pull_request:
    branches: [main]
    paths:
      - "**"
      - ".github/workflows/ci.yml"

permissions:
  contents: read
  security-events: write

jobs:
  build-test-quality-security:
    name: Build, Test, Quality & Security
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 25
        uses: actions/setup-java@v4
        with:
          distribution: liberica
          java-version: "25"

      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Make Maven wrapper executable
        run: chmod +x ./mvnw

      - name: Build and test
        run: ./mvnw clean verify -B

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: |
            **/target/surefire-reports/
            **/target/failsafe-reports/
          retention-days: 7

      - name: Upload JaCoCo coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: jacoco-report
          path: |
            **/target/site/jacoco/
            **/target/site/jacoco-it/
          retention-days: 7

      - name: Run PMD
        run: ./mvnw pmd:check pmd:pmd -B

      - name: Upload PMD report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pmd-report
          path: |
            **/target/pmd.xml
            **/target/site/pmd.html
          retention-days: 7

      - name: Run SpotBugs
        run: ./mvnw spotbugs:check spotbugs:spotbugs -B

      - name: Upload SpotBugs report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: spotbugs-report
          path: |
            **/target/spotbugsXml.xml
            **/target/spotbugs.html
          retention-days: 7

      - name: Gitleaks scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ---- Container / dependency / filesystem vuln scanning ----

      - name: Trivy filesystem scan (SARIF)
        uses: aquasecurity/trivy-action@0.24.0
        with:
          scan-type: fs
          ignore-unfixed: true
          severity: CRITICAL,HIGH
          format: sarif
          output: trivy.sarif

      - name: Upload Trivy SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy.sarif

      - name: Upload Trivy report artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: trivy-sarif
          path: trivy.sarif
          retention-days: 7

      - name: Package app (skip tests)
        run: ./mvnw -DskipTests package -B

      - name: Start app for ZAP scan
        run: |
          JAR="$(ls -1 target/*.jar | head -n 1)"
          echo "Starting $JAR"
          nohup java -jar "$JAR" > app.log 2>&1 &
          echo "Waiting for app to start..."
          sleep 20
          curl -fsS http://localhost:8080/ || true

      - name: OWASP ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.12.0
        with:
          target: "http://localhost:8080/"
          fail_action: false
          allow_issue_writing: false

      - name: Upload app log
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: app-log
          path: app.log
          retention-days: 7

      - name: Upload ZAP report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: zap-report
          path: |
            report_html.html
            report_md.md
            report_json.json
          retention-days: 7