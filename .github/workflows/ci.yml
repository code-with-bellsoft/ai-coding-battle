name: CI

on:
  push:
    branches: [main]
    paths:
      - "**"
      - ".github/workflows/ci.yml"
  pull_request:
    branches: [main]
    paths:
      - "**"
      - ".github/workflows/ci.yml"

permissions:
  contents: read
  security-events: write

jobs:
  build-test-quality-security:
    name: Build, Test, Quality & Security
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 25
        uses: actions/setup-java@v4
        with:
          distribution: liberica
          java-version: "25"

      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Make Maven wrapper executable
        run: chmod +x ./mvnw

      - name: Build and test
        run: ./mvnw clean verify -B

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: |
            **/target/surefire-reports/
            **/target/failsafe-reports/
          retention-days: 7

      - name: Upload JaCoCo coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: jacoco-report
          path: |
            **/target/site/jacoco/
            **/target/site/jacoco-it/
          retention-days: 7

      - name: Run PMD
        run: ./mvnw pmd:check pmd:pmd -B

      - name: Upload PMD report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pmd-report
          path: |
            **/target/pmd.xml
            **/target/site/pmd.html
          retention-days: 7

      - name: Run SpotBugs
        run: ./mvnw spotbugs:check spotbugs:spotbugs -B

      - name: Upload SpotBugs report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: spotbugs-report
          path: |
            **/target/spotbugsXml.xml
            **/target/spotbugs.html
          retention-days: 7

      - name: Package app (skip tests)
        run: ./mvnw -DskipTests package -B

      - name: Upload SBOM (CycloneDX JSON)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: app-sbom
          path: |
            **/target/app-sbom.json
          retention-days: 30

      - name: Setup Trivy
        uses: aquasecurity/setup-trivy@v0.2.0
        with:
          cache: true

      - name: Trivy scan SBOM
        run: |
          SBOM="target/app-sbom.json"
          echo "Using SBOM: $SBOM"
          test -f "$SBOM" || (echo "SBOM not found at $SBOM" && ls -la target && exit 1)

          trivy sbom "$SBOM" \
            --scanners vuln \
            --severity HIGH,CRITICAL \
            --exit-code 0 \
            --format json \
            --output trivy-sbom.json

      - name: Upload Trivy SBOM report artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: trivy-sbom-report
          path: trivy-sbom.json
          retention-days: 30

  zap-baseline:
    name: DAST (OWASP ZAP Baseline)
    runs-on: ubuntu-latest
    needs: build-test-quality-security

    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_DB: telemed
          POSTGRES_USER: meduser
          POSTGRES_PASSWORD: medpass
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U meduser -d telemed"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 25
        uses: actions/setup-java@v4
        with:
          distribution: liberica
          java-version: "25"

      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Make Maven wrapper executable
        run: chmod +x ./mvnw

      - name: Package app (skip tests)
        run: ./mvnw -DskipTests package -B

      - name: Start app for ZAP scan (with Postgres)
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/telemed
          SPRING_DATASOURCE_USERNAME: meduser
          SPRING_DATASOURCE_PASSWORD: medpass
        run: |
          JAR="$(ls -1 target/*.jar | head -n 1)"
          echo "Starting $JAR"
          nohup java -jar "$JAR" > app.log 2>&1 &
          echo "Waiting for app to start..."
          # wait for port instead of blind sleep
          for i in {1..30}; do
            if curl -fsS http://localhost:8080/ >/dev/null 2>&1; then
              echo "App is up."
              break
            fi
            sleep 2
          done
          curl -fsS http://localhost:8080/ || (echo "App didn't start" && tail -n 200 app.log && exit 1)

      - name: OWASP ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.12.0
        with:
          target: "http://localhost:8080/"
          fail_action: false
          allow_issue_writing: false

      - name: Upload app log
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: app-log
          path: app.log
          retention-days: 7

      - name: Upload ZAP report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: zap-report
          path: |
            report_html.html
            report_md.md
            report_json.json
          retention-days: 7